services:
  app:
    build: .
    container_name: mella_doces_app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mella_doces_db
    restart: always
    environment:
      MYSQL_DATABASE: mella_doces
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
